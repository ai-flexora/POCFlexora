name: Felxora Deploy - PR Merge to Local

on:
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_dispatch:
     
jobs:
  deploy-local:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    runs-on: self-hosted

    steps:
      # 1. Checkout latest master
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # 2. Verify Docker is available
      - name: Verify Docker
        shell: powershell
        run: |
          docker --version

      # 3. Build Docker image
      - name: Build Docker Image
        shell: powershell
        run: |
          docker build -t pocflexora .

      # 4. Stop any existing container
      - name: Stop Existing Container
        shell: powershell
        run: |
          $existing = docker ps -q -f "name=pocflexora"
          if ($existing) {
              Write-Host "Stopping existing container..."
              docker stop $existing
              docker rm $existing
          } else {
              Write-Host "No existing container found"
          }

      # 5. Run container
      - name: Start Docker Container
        shell: powershell
        run: |
          docker run -d -p 8080:8080 --name pocflexora pocflexora

      # 6. Verify Swagger is UP
      - name: Verify Swagger Loads
        shell: powershell
        run: |
          $maxRetries = 5
          $retryCount = 0
          $success = $false

          while ($retryCount -lt $maxRetries -and -not $success) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/swagger/index.html" `
                -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Swagger is UP at http://localhost:8080/swagger/index.html"
                $success = $true
              }
            } catch {
              $retryCount++
              Write-Host "Attempt $retryCount failed, retrying in 5 seconds..."
              Start-Sleep -Seconds 5
            }
          }

          if (-not $success) {
            Write-Host "Swagger failed to load"
            docker logs pocflexora
            exit 1
          }

      # 7. Post deploy summary
      - name: Deploy Summary
        shell: powershell
        run: |
          Write-Host "================================================"
          Write-Host "FELXORA DEPLOY COMPLETE"
          Write-Host "PR: ${{ github.event.pull_request.title }}"
          Write-Host "Branch: ${{ github.event.pull_request.head.ref }}"
          Write-Host "Swagger: http://localhost:8080/swagger/index.html"
          Write-Host "================================================"